networks:
  binquant_network:
    driver: bridge

services:
  api_db:
    image: postgres
    container_name: binbot_api_db
    restart: on-failure
    networks:
      - binquant_network
    volumes:
      - pg_data:/var/lib/postgresql
    env_file:
      - .env
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 30s

  binquant:
    build: .
    image: binquant
    container_name: binquant
    restart: on-failure
    networks:
      - binquant_network
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - BACKEND_DOMAIN=http://api:8000
    command: ["python3", "main.py"]

  api:
    build:
      context: api/
      dockerfile: Dockerfile
    networks:
      - binquant_network
    restart: no
    container_name: binbot
    depends_on:
      api_db:
        condition: service_healthy
        restart: true
    env_file:
      - .env
    environment:
      - POSTGRES_HOSTNAME=api_db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://api:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  pg_data:
