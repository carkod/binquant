name: Deploy to Staging (home server)
on:
  workflow_run:
    workflows: ["PR checks"]
    types: [completed]
  workflow_dispatch:

env:
  ACTIONS_RUNNER_DEBUG: false

jobs:
  full-stack-deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.STAGING_DEPLOY }}" > ~/.ssh/home_server_key
          chmod 600 ~/.ssh/home_server_key

          for attempt in {1..5}; do
            if ssh-keyscan -T 5 -p 2222 100.64.83.67 >> ~/.ssh/known_hosts; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Failed to fetch SSH host key after ${attempt} attempts" >&2
              exit 1
            fi
            echo "ssh-keyscan attempt ${attempt}/5 failed; retrying..." >&2
            sleep 3
          done

      - name: Deploy stack
        run: |
          ssh -i ~/.ssh/home_server_key \
            -p 2222 \
            -o StrictHostKeyChecking=yes \
            "carkod@100.64.83.67" \
            'cd /var/www/binquant && docker compose up --pull always -d --build && docker image prune -f'
