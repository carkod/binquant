name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy, default: latest"
        required: false
        default: ""
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  BINQUANT_IMAGE: carloswufei/binquant

jobs:
  deploy:
    name: Release new production version
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Log in to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" |
            docker login --username "$DOCKER_USERNAME" --password-stdin

      - name: Calculate next image version
        id: version
        shell: bash
        run: |
          versions_file="$RUNNER_TEMP/docker-image-versions"
          : > "$versions_file"

          next_url="https://hub.docker.com/v2/repositories/${BINQUANT_IMAGE}/tags?page_size=100"

          while [ -n "$next_url" ]; do
            response="$(curl --fail --silent --show-error "$next_url")"
            jq --raw-output \
              '.results[].name | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' \
              <<< "$response" >> "$versions_file"
            next_url="$(jq --raw-output '.next // empty' <<< "$response")"
          done

          latest_version="$(
            sort --version-sort "$versions_file" |
              tail --lines 1
          )"

          if [ -z "$latest_version" ]; then
            next_version="0.0.1"
          else
            IFS=. read -r major minor patch <<< "$latest_version"
            next_version="$major.$minor.$((patch + 1))"
          fi

          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "Production version: $next_version"

      - name: Resolve deploy image tags
        id: deploy_tags
        shell: bash
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          normalize_image_tag() {
            local image_tag
            image_tag="$(printf '%s' "$1" | xargs)"

            if [ -z "$image_tag" ]; then
              image_tag="latest"
            fi

            printf '%s\n' "$image_tag"
          }

          image_tag="$(normalize_image_tag "$IMAGE_TAG")"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "Image tag: $image_tag"

      - name: Verify deploy image
        env:
          IMAGE_TAG: ${{ steps.deploy_tags.outputs.image_tag }}
        run: |
          docker pull "$BINQUANT_IMAGE:$IMAGE_TAG"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.4
        env:
          IMAGE_TAG: ${{ steps.deploy_tags.outputs.image_tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /var/www/terminal.binbot.in
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker pull carloswufei/binquant:$IMAGE_TAG
            docker tag carloswufei/binquant:$IMAGE_TAG carloswufei/binquant:latest
            docker compose up --pull never -d
            docker image prune -f

      - name: Version deployed production images
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.deploy_tags.outputs.image_tag }}
        run: |
          docker tag "$BINQUANT_IMAGE:$IMAGE_TAG" "$BINQUANT_IMAGE:latest"
          docker tag "$BINQUANT_IMAGE:$IMAGE_TAG" "$BINQUANT_IMAGE:$VERSION"
          docker tag "$BINQUANT_IMAGE:$IMAGE_TAG" "$BINQUANT_IMAGE:production"
          docker push "$BINQUANT_IMAGE:latest"
          docker push "$BINQUANT_IMAGE:$VERSION"
          docker push "$BINQUANT_IMAGE:production"
